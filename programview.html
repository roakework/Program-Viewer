<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mazatrol Conversational Viewer — Feature 1 v2.1</title>
  <style>
    :root {
      --bg: #020607;
      --panel: #071013;
      --panel-2: #0b181c;
      --line: #1b4b55;
      --cyan: #31e7ff;
      --yellow: #ffe65b;
      --white: #f7fbfc;
      --muted: #79a4ac;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--white);
      background:
        linear-gradient(rgba(49, 231, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(49, 231, 255, 0.025) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      font-family: Consolas, "Courier New", monospace;
    }

    button, textarea, input { font: inherit; }

    .app { width: min(1500px, 100%); margin: auto; padding: 20px; }

    .machine-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-bottom: 3px solid var(--cyan);
      background: #061114;
    }

    h1 { margin: 0; color: var(--cyan); font-size: clamp(1.15rem, 2vw, 1.7rem); letter-spacing: .08em; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: .78rem; }
    .status { color: var(--yellow); font-size: .82rem; white-space: nowrap; }

    .workbench {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .panel { border: 1px solid var(--line); background: rgba(7, 16, 19, .96); }
    .panel-title { padding: 9px 12px; color: var(--cyan); background: var(--panel-2); border-bottom: 1px solid var(--line); letter-spacing: .06em; }
    .input-body { padding: 12px; }

    .drop-zone {
      display: block;
      padding: 18px 12px;
      text-align: center;
      border: 1px dashed #2e8998;
      color: var(--cyan);
      background: #061317;
      cursor: pointer;
    }

    .drop-zone.dragging { border-color: var(--yellow); color: var(--yellow); background: #161706; }
    .drop-zone small { display: block; color: var(--muted); margin-top: 6px; }
    #fileInput { display: none; }

    textarea {
      width: 100%;
      min-height: 365px;
      margin-top: 12px;
      resize: vertical;
      border: 1px solid var(--line);
      outline: none;
      padding: 11px;
      color: var(--white);
      background: #010506;
      line-height: 1.45;
      font-size: .78rem;
    }

    textarea:focus { border-color: var(--cyan); }
    .actions { display: flex; gap: 8px; margin-top: 10px; }

    button {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--cyan);
      color: #001013;
      background: var(--cyan);
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary { color: var(--cyan); background: transparent; }
    button:hover { filter: brightness(1.12); }
    .error { min-height: 1.2em; margin-top: 9px; color: var(--danger); font-size: .78rem; }

    .program-banner {
      display: grid;
      grid-template-columns: max-content max-content 1fr max-content;
      gap: 18px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #030a0c;
    }

    .label { color: var(--yellow); }
    .value { color: var(--white); }
    .empty { padding: 50px 20px; text-align: center; color: var(--muted); }
    .units { overflow-x: auto; }

    .unit {
      display: grid;
      grid-template-columns: 112px 160px minmax(360px, 1fr);
      min-width: 690px;
      border-bottom: 1px solid var(--line);
    }

    .unit-number, .unit-name, .unit-data { padding: 12px; }
    .unit-number { color: var(--cyan); background: #07171b; font-size: 1.08rem; font-weight: 700; border-right: 1px solid var(--line); }
    .unit-name { color: var(--white); border-right: 1px solid var(--line); }
    .unit-data { display: grid; gap: 9px; }

    .command-row { display: grid; grid-template-columns: 74px minmax(0, 1fr); gap: 10px; align-items: start; }
    .command { color: var(--cyan); }
    .pairs { display: flex; flex-wrap: wrap; gap: 6px 12px; }
    .pair { white-space: nowrap; }
    .pair-key { color: var(--yellow); }
    .pair-value { color: var(--white); }
    .sequence { margin: 3px 0 2px 10px; border-left: 3px solid var(--yellow); background: #0c1415; }
    .sequence-head { padding: 7px 10px; color: var(--yellow); border-bottom: 1px solid #263e42; }
    .sequence-body { padding: 8px 10px; display: grid; gap: 7px; }

    .command-name { display: block; margin-top: 2px; color: var(--muted); font-size: .68rem; line-height: 1.15; }
    .execution-strip { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; padding: 9px 14px; border-bottom: 1px solid var(--line); background: #071316; }
    .order-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 7px; border: 1px solid var(--yellow); border-radius: 3px; color: var(--yellow); background: #171603; font-size: .7rem; font-weight: 700; white-space: nowrap; }
    .highlight-row { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 7px; padding: 7px 9px; border: 1px solid #7d7128; background: #171603; }
    .tool-detail { white-space: nowrap; }

    /* Mazak-monitor table surface */
    .workbench { display: block; }
    .workbench > .panel:first-child { margin-bottom: 14px; }
    textarea { min-height: 180px; }
    .mz-screen { min-width: 1120px; padding: 0 0 28px; background: #000018; overflow: hidden; }
    .mz-unit { margin-bottom: 29px; }
    .mz-unit:last-child { margin-bottom: 0; }
    .mz-table { width: 100%; border-collapse: collapse; table-layout: auto; color: #fff; background: #000; }
    .mz-table th, .mz-table td { height: 30px; padding: 2px 6px; border: 1px solid #4e535b; text-align: center; white-space: nowrap; font-size: 1rem; font-weight: 400; }
    .mz-table th { color: #000; }
    .mz-table .unit-head th { background: linear-gradient(#68a5ff, #3f73dc); }
    .mz-table .tool-head th { background: linear-gradient(#ffe986, #eed05a); }
    .mz-table .fig-head th { background: #9ceda4; }
    .mz-table .row-no { width: 42px; min-width: 42px; color: #000; background: #e7e7e7; text-align: right; }
    .mz-table .op { color: #00ff2f; text-align: left; }
    .mz-table .priority { color: #fff500; font-size: 1.08rem; }
    .mz-table .green { color: #00ff2f; }
    .mz-table .yellow { color: #fff500; }
    .mz-table .red { color: #ff2525; }
    .mz-table .magenta { color: #fff; background: #ed00d9; }
    .mz-table .left { text-align: left; }
    .mz-table .fill { width: 100%; }
    .mz-table .diamond { font-size: 1.15rem; }
    .mz-table .narrow { width: 36px; min-width: 36px; padding-left: 3px; padding-right: 3px; }
    .mz-table .wide { min-width: 125px; }
    .mz-order-note { padding: 7px 10px; color: #fff500; border-bottom: 1px solid #3a4150; background: #070720; font-size: .78rem; }
    .mz-preserved { margin: 0; border: 0; border-top: 1px solid #34404d; background: #02020e; }
    .mz-preserved summary { padding: 6px 10px; color: #76aab4; font-size: .7rem; }
    .mz-preserved pre { max-height: 260px; color: #b6d3d8; background: #010107; white-space: pre-wrap; }
    .manual-raw-box { border: 1px solid #4e535b; border-top: 0; background: #000; }
    .manual-raw-title { padding: 6px 10px; color: #000; background: linear-gradient(#ffe986, #eed05a); font-size: .9rem; }
    .manual-raw-code { margin: 0; max-height: none; padding: 10px 12px; border: 0; color: #fff; background: #000; white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.55; font-size: .9rem; }
    .manual-unit .mz-table th, .manual-unit .mz-table td { height: 30px; padding-top: 1px; padding-bottom: 1px; }
    .manual-unit .mz-table th:first-child, .manual-unit .mz-table td:first-child { width: 44px; min-width: 44px; }
    .manual-unit .manual-address { width: 28px; min-width: 28px; padding-left: 3px; padding-right: 3px; }
    .manual-unit .manual-data-value { width: 105px; min-width: 88px; }
    .manual-unit .fig-head th { font-size: .9rem; }
    [hidden] { display: none !important; }
    .view-tabs { display: flex; gap: 6px; margin-top: 14px; border-bottom: 2px solid var(--cyan); }
    .view-tab { flex: 0 0 auto; min-width: 180px; color: var(--cyan); background: #071013; border-color: var(--line); border-bottom: 0; }
    .view-tab.active { color: #001013; background: var(--cyan); border-color: var(--cyan); }
    .program-file-tabs { display: flex; gap: 5px; margin: 14px 0 0; padding: 0 8px; overflow-x: auto; border-bottom: 2px solid #4f81e1; background: #03090b; }
    .program-file-tab { flex: 0 0 auto; min-width: 150px; max-width: 280px; padding: 8px 12px; overflow: hidden; color: #9bc4ff; background: #0b181c; border-color: #375c65; border-bottom: 0; text-overflow: ellipsis; white-space: nowrap; cursor: grab; }
    .program-file-tab.active { color: #001013; background: linear-gradient(#68a5ff, #3f73dc); border-color: #68a5ff; }
    .program-file-tab.dragging { opacity: .35; cursor: grabbing; }
    .program-file-tab.drag-before { box-shadow: inset 4px 0 0 var(--yellow); }
    .program-file-tab.drag-after { box-shadow: inset -4px 0 0 var(--yellow); }
    .tool-summary-panel { margin-top: 14px; }
    .tool-summary-titlebar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 7px 10px 7px 12px; color: var(--cyan); background: var(--panel-2); border-bottom: 1px solid var(--line); letter-spacing: .06em; }
    .excel-export-button { flex: 0 0 auto; padding: 6px 12px; color: #001013; background: var(--yellow); border-color: var(--yellow); font-size: .78rem; letter-spacing: .03em; }
    .excel-export-button:disabled { cursor: not-allowed; filter: grayscale(1); opacity: .45; }
    .tool-summary-wrap { overflow-x: auto; background: #000018; }
    .tool-summary-table { width: 100%; min-width: 820px; border-collapse: collapse; background: #000; }
    .tool-summary-table th { padding: 8px 10px; border: 1px solid #4e535b; color: #000; background: linear-gradient(#68a5ff, #3f73dc); font-weight: 400; white-space: nowrap; }
    .tool-summary-table td { padding: 8px 10px; border: 1px solid #4e535b; color: #fff; text-align: center; vertical-align: top; }
    .tool-summary-table .summary-unit, .tool-summary-table .summary-tool { color: #00ff2f; }
    .tool-summary-table .summary-tool { text-align: left; }
    .tool-summary-table .summary-location { color: #fff500; white-space: nowrap; }
    .tool-summary-table .priority { color: #fff500; }
    .tool-summary-table .magenta { color: #fff; background: #ed00d9; }
    .tool-summary-empty { padding: 24px; color: var(--muted); text-align: center; }
    .tool-card { margin: 12px; border: 1px solid #375c65; background: #03090b; }
    .tool-card-head { display: grid; grid-template-columns: max-content minmax(250px, 1fr) max-content max-content; align-items: center; gap: 12px; padding: 9px 12px; color: #fff; background: #0b181c; border-bottom: 1px solid #375c65; list-style: none; cursor: pointer; }
    .tool-card-head::-webkit-details-marker { display: none; }
    .tool-collapse-indicator { color: var(--yellow); transition: transform .15s ease; }
    .tool-card:not([open]) .tool-collapse-indicator { transform: rotate(-90deg); }
    .tool-card-number { color: #00ff2f; }
    .tool-card-number { font-size: 1.05rem; }
    .multi-unit-badge { padding: 3px 7px; color: #001013; background: var(--yellow); font-size: .7rem; font-weight: 700; }
    .single-unit-badge { padding: 3px 7px; color: var(--muted); border: 1px solid #375c65; font-size: .7rem; }
    .tool-units { color: var(--cyan); white-space: nowrap; }
    .tool-callout-table { min-width: 760px; }
    .program-document + .program-document { margin-top: 22px; border-top: 3px solid var(--cyan); }

    details { margin-top: 14px; border: 1px solid var(--line); background: var(--panel); }
    summary { padding: 10px 12px; color: var(--cyan); cursor: pointer; }
    pre { max-height: 420px; overflow: auto; margin: 0; padding: 13px; border-top: 1px solid var(--line); color: #d8f7fb; font-size: .76rem; }

    @media (max-width: 850px) {
      .workbench { grid-template-columns: 1fr; }
      textarea { min-height: 230px; }
      .program-banner { grid-template-columns: 1fr; gap: 5px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="machine-header">
      <div>
        <h1>MAZATROL CONVERSATIONAL VIEWER</h1>
        <div class="subtitle">FEATURE 1 v2.1 · PARSER + GRID ENGINE</div>
      </div>
      <div class="status" id="status">READY</div>
    </header>

    <nav class="view-tabs" id="viewTabs" aria-label="Application views" hidden>
      <button class="view-tab active" id="programTabButton" type="button" data-view="program">PROGRAM VIEW</button>
      <button class="view-tab" id="toolsTabButton" type="button" data-view="tools">TOOL USAGE</button>
    </nav>

    <div id="programView">
    <section class="workbench">
      <aside class="panel">
        <div class="panel-title">PAM INPUT</div>
        <div class="input-body">
          <label class="drop-zone" id="dropZone" for="fileInput">
            LOAD .PAM / .TXT FILES
            <small>Click or drag all face programs here</small>
          </label>
          <input id="fileInput" type="file" accept=".pam,.txt,text/plain" multiple>
          <textarea id="source" spellcheck="false" aria-label="Raw PAM data" placeholder="Uploaded PAM programs will appear here" readonly></textarea>
          <div class="error" id="error" role="alert"></div>
        </div>
      </aside>

      <nav class="program-file-tabs" id="programFileTabs" aria-label="Uploaded PAM programs" hidden></nav>

      <section class="panel" aria-live="polite">
        <div class="panel-title">CONVERSATIONAL PROGRAM GRID</div>
        <div id="viewer"><div class="empty">UPLOAD A .PAM FILE TO BEGIN</div></div>
      </section>
    </section>

    <details>
      <summary>STRUCTURED JSON OUTPUT</summary>
      <pre id="jsonOutput">{}</pre>
    </details>
    </div>

    <section class="panel tool-summary-panel" id="toolsView" hidden>
      <div class="tool-summary-titlebar">
        <span>TOOL USAGE · CROSS-UNIT SUMMARY</span>
        <button class="excel-export-button" id="exportToolUsageButton" type="button" disabled>EXPORT TO EXCEL</button>
      </div>
      <div class="tool-summary-wrap" id="toolSummary"></div>
    </section>
  </main>

  <script>
    // ---------- Feature 1: pure parser engine ----------
    function decodeHexUtf8(hex) {
      if (!hex || hex.length % 2 !== 0 || !/^[0-9a-f]+$/i.test(hex)) return null;
      try {
        const bytes = new Uint8Array(hex.match(/.{2}/g).map(byte => parseInt(byte, 16)));
        const decoded = new TextDecoder("utf-8", { fatal: true }).decode(bytes);
        return /^[\x20-\x7e\s]+$/.test(decoded) ? decoded : null;
      } catch (_) {
        return null;
      }
    }

    function extractParameters(source) {
      const parameters = [];
      // PAM fields are commonly packed together: U2H0.Z0.025I1.
      // Ampersands may prefix either the field or its value: &Q0 / X&-2.7.
      const pattern = /(&?)([A-Z]{1,3})(&?)([-+]?(?:\d+(?:\.\d*)?|\.\d+))/gi;
      let match;
      while ((match = pattern.exec(source)) !== null) {
        const rawValue = `${match[3]}${match[4]}`;
        parameters.push({
          key: match[2].toUpperCase(),
          value: Number(match[4]),
          rawValue,
          rawToken: match[0],
          continuation: Boolean(match[1] || match[3])
        });
      }
      return parameters;
    }

    function splitCommandBlocks(text) {
      const normalized = text.replace(/\r\n?/g, "\n").trim();
      if (!normalized) return [];

      // G-codes and N markers can appear mid-line in PAM backups.
      const starts = [];
      const marker = /(^|\s)(G\d{3}|N\d+)(?=[A-Z\s]|$)/gim;
      let match;
      while ((match = marker.exec(normalized)) !== null) {
        starts.push(match.index + match[1].length);
      }
      if (!starts.length) return [normalized];
      if (starts[0] > 0) starts.unshift(0);

      return starts.map((start, index) =>
        normalized.slice(start, starts[index + 1] ?? normalized.length).trim()
      ).filter(Boolean);
    }

    function normalizePriority(parameter) {
      if (!parameter) return { value: null, rawValue: null, encodedRawValue: null, isLate: false };
      const encodedRawValue = parameter.rawValue.replace(/^&/, "");
      const isLate = parameter.value < 0 || encodedRawValue.startsWith("-");
      const rawValue = encodedRawValue.replace(/^-/, "");
      return {
        value: Math.abs(parameter.value),
        rawValue,
        encodedRawValue,
        isLate
      };
    }

    function makeBlock(raw, sourceLine) {
      const commandMatch = raw.match(/^(G\d{3}|N\d+)/i);
      const command = commandMatch ? commandMatch[1].toUpperCase() : "RAW";
      const commandLabels = {
        G300: "Initial Setup",
        G301: "End",
        G303: "Sub Program",
        G305: "Manual Unit",
        G350: "Drilling",
        G356: "Circle Mill",
        G369: "Chamfer Out",
        G380: "Offset",
        G371: "Cycle",
        G424: "Tool Process",
        G420: "Geometry"
      };
      const hexMatches = [...raw.matchAll(/\(([0-9A-F]{4,})\)/gi)];
      const decodedText = hexMatches.map(item => decodeHexUtf8(item[1])).find(Boolean) || null;
      const comments = [...raw.matchAll(/\(([^)]*)\)/g)]
        .map(item => item[1].trim())
        .filter(comment => comment && !decodeHexUtf8(comment));
      const parameterSource = raw
        .slice(commandMatch ? commandMatch[0].length : 0)
        .replace(/\([^)]*\)/g, " ");
      const parameters = extractParameters(parameterSource);
      const priorityParameter = parameters.find(item => item.key === "P");
      const priorityInfo = normalizePriority(priorityParameter);
      const toolNumber = parameters.find(item => item.key === "T");
      const nominalDiameter = parameters.find(item => item.key === "D");
      return {
        command,
        commandName: commandLabels[command] || (command.startsWith("N") ? "Sequence" : "Unmapped Command"),
        parameters,
        priority: priorityInfo.value,
        priorityRaw: priorityInfo.rawValue,
        priorityEncodedRaw: priorityInfo.encodedRawValue,
        priorityIsLate: priorityInfo.isLate,
        tool: toolNumber || comments[0] ? {
          number: toolNumber?.value ?? null,
          numberRaw: toolNumber?.rawValue ?? null,
          nominalDiameter: nominalDiameter?.value ?? null,
          nominalDiameterRaw: nominalDiameter?.rawValue ?? null,
          name: comments[0] || null
        } : null,
        comments,
        decodedText,
        raw,
        sourceLine
      };
    }

    const CONTEXTUAL_MAPPING_DICTIONARY = Object.freeze({
      unitContexts: {
        setup: {
          unitNumbers: [0], commands: ["G300"],
          fields: { Z: "INITIAL-Z", HEX: "MAT" }
        },
        endProgram: {
          commands: ["G301"],
          fields: {}
        },
        subProgram: {
          commands: ["G303"],
          fields: {}
        },
        offset: {
          unitNumbers: [1], commands: ["G380"],
          fields: { X: "U(X)", Y: "V(Y)", D: "D(th)", Z: "W(Z)" }
        },
        faceMill: {
          commands: ["G371"],
          fields: { H: "DEPTH", Z: ["SRV-Z", "FIN-Z"], I: "BTM" }
        },
        drilling: {
          commands: ["G350"],
          fields: {}
        },
        circleMill: {
          commands: ["G356"],
          fields: {}
        },
        chamferOut: {
          commands: ["G369"],
          fields: {}
        },
        cborTap: {
          unitNumbers: [3], commands: ["G357"],
          fields: { D: "MAJOR-Ø", V: "TAP-DEP" }
        },
        manual: {
          commands: ["G305"],
          fields: { T: "Tool No.", D: "NOM-Ø", S: "TOOL CODE", P: "No." }
        }
      },
      sequence: {
        P: "No.",
        S: "C-SP",
        J: "FR",
        T: "Tool No.",
        D: "NOM-Ø",
        X: "APRCH-X",
        Y: "APRCH-Y",
        E: "HOLE-Ø",
        H: "HOLE-DEP"
      },
      manualShape: {
        GA: "G1",
        GB: "G2",
        X: "DATA 1",
        Y: "DATA 2",
        Z: "DATA 3",
        F: "DATA 4",
        SA: "S",
        MA: "M/B"
      },
      toolCallouts: {
        14: "FCE MILL",
        2: "DRILL",
        5: "TAP",
        13: "CHAMFER",
        15: "END MILL"
      }
    });

    function contextualValue(parameter) {
      if (!parameter) return null;
      if (parameter.rawValue.startsWith("&")) return parameter.rawValue;
      return parameter.rawToken.startsWith("&") ? `&${parameter.rawValue}` : parameter.rawValue;
    }

    function resolveUnitType(unitNumber, command, previousType = null) {
      // Explicit command markers take precedence over conventional Unit numbers.
      for (const [type, definition] of Object.entries(CONTEXTUAL_MAPPING_DICTIONARY.unitContexts)) {
        if (definition.commands?.includes(command)) return type;
      }
      for (const [type, definition] of Object.entries(CONTEXTUAL_MAPPING_DICTIONARY.unitContexts)) {
        if (definition.unitNumbers?.includes(Number(unitNumber))) return type;
      }
      return previousType || "generic";
    }

    function addMappedField(mappedFields, label, parameter) {
      if (!parameter || !label) return;
      const value = label === "No." ? normalizePriority(parameter).rawValue : contextualValue(parameter);
      if (!(label in mappedFields)) mappedFields[label] = value;
      else if (Array.isArray(mappedFields[label])) mappedFields[label].push(value);
      else mappedFields[label] = [mappedFields[label], value];
    }

    function applyContextualMapping(block, context) {
      const mappedFields = {};
      const isSequence = /^N\d+$/i.test(block.command);
      const isManualShape = isSequence && context.unitType === "manual" && context.sectionCommand === "G420";
      const mapping = isManualShape
        ? CONTEXTUAL_MAPPING_DICTIONARY.manualShape
        : isSequence
        ? CONTEXTUAL_MAPPING_DICTIONARY.sequence
        : (CONTEXTUAL_MAPPING_DICTIONARY.unitContexts[context.unitType]?.fields || {});

      const occurrences = {};
      block.parameters.forEach(parameter => {
        const target = mapping[parameter.key];
        if (!target) return;
        const occurrence = occurrences[parameter.key] || 0;
        const label = Array.isArray(target) ? (target[occurrence] || target[target.length - 1]) : target;
        addMappedField(mappedFields, label, parameter);
        occurrences[parameter.key] = occurrence + 1;
      });

            chamferOutGeometryRow: block.chamferOutGeometryRow || null,
            priority: block.priority,
            priorityRaw: block.priorityRaw,
            priorityIsLate: block.priorityIsLate,
            tool: block.tool,
            parameters: block.parameters,
            blocks: [block],
            rawLines: [block.raw]
          };
          currentUnit.sequences.push(currentSequence);
          currentUnit.rawLines.push(block.raw);
          return;
        }

        if (currentSequence && !unitToken) {
          currentSequence.blocks.push(block);
          currentSequence.rawLines.push(block.raw);
          currentUnit.rawLines.push(block.raw);
          if (currentSequence.priority === null && block.priority !== null) {
            currentSequence.priority = block.priority;
            currentSequence.priorityRaw = block.priorityRaw;
            currentSequence.priorityIsLate = block.priorityIsLate;
          }
          if (!currentSequence.tool && block.tool) currentSequence.tool = block.tool;
        } else if (currentUnit) {
          currentUnit.blocks.push(block);
          currentUnit.rawLines.push(block.raw);
          if (/^G\d{3}$/.test(block.command)) currentContextCommand = block.command;
        } else {
          preamble.push(block);
        }
      });

      const executionOrder = [];
      units.forEach(unit => {
        const prioritySources = [
          ...unit.blocks.map(block => ({ block, sequence: null })),
          ...unit.sequences.flatMap(sequence => sequence.blocks.map(block => ({ block, sequence })))
        ].filter(item => item.block.priority !== null);

        unit.priorities = prioritySources.map(item => ({
          value: item.block.priority,
          rawValue: item.block.priorityRaw,
          isLate: item.block.priorityIsLate,
          command: item.block.command,
          sequence: item.sequence?.id || null
        }));
        unit.priority = unit.priorities[0]?.value ?? null;
        prioritySources.forEach(item => executionOrder.push({
          priority: item.block.priority,
          priorityRaw: item.block.priorityRaw,
          priorityIsLate: item.block.priorityIsLate,
          unit: unit.id,
          unitNumber: unit.number,
          sequence: item.sequence?.id || null,
          command: item.block.command,
          tool: item.block.tool
        }));
      });
      executionOrder.sort((a, b) => Number(a.priorityIsLate) - Number(b.priorityIsLate) || a.priority - b.priority || a.unitNumber - b.unitNumber);

      return {
        header,
        units,
        preamble,
        executionOrder,
        metadata: {
          unitCount: units.length,
          sequenceCount: units.reduce((sum, unit) => sum + unit.sequences.length, 0),
          rawLineCount: rawText ? rawText.split(/\r\n?|\n/).length : 0,
          parsedBlockCount: preamble.length + units.reduce((sum, unit) =>
            sum + unit.blocks.length + unit.sequences.reduce((sequenceSum, sequence) => sequenceSum + sequence.blocks.length, 0), 0),
          unmappedBlockCount: preamble.filter(block => block.commandName === "Unmapped Command").length + units.reduce((sum, unit) =>
            sum + unit.blocks.filter(block => block.commandName === "Unmapped Command").length +
            unit.sequences.reduce((sequenceSum, sequence) => sequenceSum + sequence.blocks.filter(block => block.commandName === "Unmapped Command").length, 0), 0)
        },
        rawText
      };
    }

    const escapeHtml = value => String(value ?? "").replace(/[&<>'"]/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
    })[char]);

    function parametersFor(block, key) {
      return block ? block.parameters.filter(item => item.key === key) : [];
    }

    function field(block, key, occurrence = 0, fallback = "") {
      const parameter = parametersFor(block, key)[occurrence];
      return parameter ? contextualValue(parameter) : fallback;
    }

    function mappedField(block, label, occurrence = 0, fallback = "") {
      const mapped = block?.mappedFields?.[label];
      if (mapped === undefined || mapped === null) return fallback;
      if (Array.isArray(mapped)) return mapped[occurrence] ?? fallback;
      return occurrence === 0 ? mapped : fallback;
    }

    function numericField(block, key, occurrence = 0) {
      return parametersFor(block, key)[occurrence]?.value ?? null;
    }

    function blockFor(unit, command) {
      return unit.blocks.find(block => block.command === command) || null;
    }

    function calloutLocationsForUnit(unit) {
      const geometrySequences = unit.sequences.filter(sequence => sequence.contextCommand === "G420");
      const locations = [];
      geometrySequences.forEach(sequence => {
        const block = sequence.blocks[0];
        const faceRow = sequence.faceMillGeometryRow || block.faceMillGeometryRow;
        const chamferRow = sequence.chamferOutGeometryRow || block.chamferOutGeometryRow;
        const pointRow = sequence.drillTapGeometryRow || block.drillTapGeometryRow ||
          sequence.circleMillGeometryRow || block.circleMillGeometryRow ||
          sequence.drillingGeometryRow || block.drillingGeometryRow;
        const manualRow = sequence.manualRow || block.manualRow;

        if (faceRow || chamferRow) {
          const row = faceRow || chamferRow;
          locations.push({ x: row.p1x, y: row.p1y, source: `FIG ${row.sequenceNumber}` });
        } else if (pointRow) {
          locations.push({ x: pointRow.x, y: pointRow.y, source: `FIG ${pointRow.sequenceNumber}` });
        } else if (manualRow) {
          const x = manualRow.data.find(item => item.address === "X")?.value || "";
          const y = manualRow.data.find(item => item.address === "Y")?.value || "";
          if (x || y) locations.push({ x, y, source: `SNo. ${manualRow.sequenceNumber}` });
        } else {
          const fallback = {
            x: field(block, "X", 0),
            y: field(block, "Y", 0),
            source: `FIG ${sequence.number}`
          };
          if (fallback.x || fallback.y) locations.push(fallback);
        }
      });
      return locations;
    }

    function nominalIdentity(value) {
      const text = String(value || "").trim();
      if (!text) return "BLANK";
      const numeric = Number(text);
      return Number.isFinite(numeric) ? `NUMBER:${numeric}` : `TEXT:${text.toUpperCase()}`;
    }

    function buildToolSummary(program) {
      const summaryByTool = new Map();
      const sourceFileName = program.sourceFileName || "PAM PROGRAM";
      const programNumber = program.header.programNumber || "UNKNOWN";
      const addCallout = (unit, tool, sequenceLabel, calloutIndex, unitLocations) => {
        if (!tool || (!tool.toolName && tool.toolNumber == null)) return;
        const location = unitLocations[calloutIndex] || unitLocations[0] ||
          ((tool.approachX || tool.approachY) ? { x: tool.approachX || "", y: tool.approachY || "", source: "APPROACH" } : { x: "", y: "", source: "" });
        const toolName = String(tool.toolName || "UNMAPPED").toUpperCase();
        const nominalDiameter = String(tool.nominalDiameter || "");
        const letterCallout = String(tool.toolFlag || tool.diameterFlag || "").toUpperCase();
        const key = `${toolName}|${nominalIdentity(nominalDiameter)}|${letterCallout}`;
        if (!summaryByTool.has(key)) {
          summaryByTool.set(key, {
            uniqueToolKey: key,
            toolName,
            nominalDiameter,
            letterCallout,
            uniqueToolLabel: `${nominalDiameter}${letterCallout}`,
            toolNumbers: [],
            unitNumbers: [],
            unitReferences: [],
            worksInMultipleUnits: false,
            calloutCount: 0,
            callouts: []
          });
        }
        const entry = summaryByTool.get(key);
        if (tool.toolNumber != null && !entry.toolNumbers.includes(tool.toolNumber)) entry.toolNumbers.push(tool.toolNumber);
        if (!entry.unitNumbers.includes(unit.number)) entry.unitNumbers.push(unit.number);
        const unitKey = `${sourceFileName}|${programNumber}|${unit.number}`;
        if (!entry.unitReferences.some(reference => reference.key === unitKey)) {
          entry.unitReferences.push({ key: unitKey, fileName: sourceFileName, programNumber, unitNumber: unit.number });
        }
        entry.callouts.push({
          sourceFileName,
          programNumber,
          unitNumber: unit.number,
          unitType: unit.type,
          sequence: sequenceLabel,
          toolNumber: tool.toolNumber ?? "",
          nominalDiameter,
          letterCallout,
          priority: tool.priority || "",
          priorityIsLate: Boolean(tool.priorityIsLate),
          x: location.x || "",
          y: location.y || "",
          locationSource: location.source || ""
        });
        entry.calloutCount = entry.callouts.length;
      };

      program.units.forEach(unit => {
        const unitLocations = calloutLocationsForUnit(unit);
        if (unit.type === "manual" && unit.manualHeader) {
          addCallout(unit, unit.manualHeader, "G305", 0, unitLocations);
        }
        unit.sequences.filter(sequence => sequence.contextCommand === "G424").forEach((sequence, calloutIndex) => {
          const block = sequence.blocks[0];
          const row = sequence.faceMillToolRow || block.faceMillToolRow ||
            sequence.drillTapToolRow || block.drillTapToolRow ||
            sequence.circleMillToolRow || block.circleMillToolRow ||
            sequence.drillingToolRow || block.drillingToolRow ||
            sequence.chamferOutToolRow || block.chamferOutToolRow;
          if (row) {
            addCallout(unit, row, sequence.id, calloutIndex, unitLocations);
          } else if (block.tool) {
            addCallout(unit, {
              toolNumber: block.tool.number,
              toolName: block.tool.name || `TOOL ${block.tool.number ?? ""}`,
              nominalDiameter: block.tool.nominalDiameterRaw,
              approachX: field(block, "X", 0),
              approachY: field(block, "Y", 0),
              priority: block.priorityRaw,
              priorityIsLate: block.priorityIsLate
            }, sequence.id, calloutIndex, unitLocations);
          }
        });
      });
      return [...summaryByTool.values()].map(entry => {
        entry.unitNumbers.sort((a, b) => a - b);
        entry.toolNumbers.sort((a, b) => a - b);
        entry.unitReferences.sort((a, b) => a.fileName.localeCompare(b.fileName) || a.unitNumber - b.unitNumber);
        entry.worksInMultipleUnits = entry.unitReferences.length > 1;
        entry.callouts.sort((a, b) => a.sourceFileName.localeCompare(b.sourceFileName) || a.unitNumber - b.unitNumber || String(a.sequence).localeCompare(String(b.sequence), undefined, { numeric: true }));
        return entry;
      }).sort((a, b) => a.toolName.localeCompare(b.toolName) || nominalIdentity(a.nominalDiameter).localeCompare(nominalIdentity(b.nominalDiameter), undefined, { numeric: true }) || a.letterCallout.localeCompare(b.letterCallout));
    }

    function combineToolSummaries(summaries) {
      const combined = new Map();
      summaries.flat().forEach(entry => {
        if (!combined.has(entry.uniqueToolKey)) {
          combined.set(entry.uniqueToolKey, {
            ...entry,
            toolNumbers: [],
            unitNumbers: [],
            unitReferences: [],
            callouts: []
          });
        }
        const target = combined.get(entry.uniqueToolKey);
        entry.toolNumbers.forEach(number => { if (!target.toolNumbers.includes(number)) target.toolNumbers.push(number); });
        entry.unitNumbers.forEach(number => { if (!target.unitNumbers.includes(number)) target.unitNumbers.push(number); });
        entry.unitReferences.forEach(reference => {
          if (!target.unitReferences.some(item => item.key === reference.key)) target.unitReferences.push(reference);
        });
        target.callouts.push(...entry.callouts);
      });
      return [...combined.values()].map(entry => {
        entry.toolNumbers.sort((a, b) => a - b);
        entry.unitNumbers.sort((a, b) => a - b);
        entry.unitReferences.sort((a, b) => a.fileName.localeCompare(b.fileName) || a.unitNumber - b.unitNumber);
        entry.callouts.sort((a, b) => a.sourceFileName.localeCompare(b.sourceFileName) || a.unitNumber - b.unitNumber || String(a.sequence).localeCompare(String(b.sequence), undefined, { numeric: true }));
        entry.calloutCount = entry.callouts.length;
        entry.worksInMultipleUnits = entry.unitReferences.length > 1;
        return entry;
      }).sort((a, b) => a.toolName.localeCompare(b.toolName) || nominalIdentity(a.nominalDiameter).localeCompare(nominalIdentity(b.nominalDiameter), undefined, { numeric: true }) || a.letterCallout.localeCompare(b.letterCallout));
    }

        return `<details class="tool-card" open>

            <div class="${entry.worksInMultipleUnits ? "multi-unit-badge" : "single-unit-badge"}">${entry.worksInMultipleUnits ? "MULTIPLE UNITS" : "ONE UNIT"} · ${entry.calloutCount} CALLOUT${entry.calloutCount === 1 ? "" : "S"}</div>
          </summary>
          <div class="tool-summary-wrap"><table class="tool-summary-table tool-callout-table">
            <thead><tr><th>PAM FILE</th><th>PROGRAM</th><th>UNIT</th><th>CALLOUT</th><th>NOM-Ø</th><th>LETTER</th><th>PRIORITY</th><th>X LOCATION</th><th>Y LOCATION</th></tr></thead>
            <tbody>${calloutRows}</tbody>
          </table></div>
        </details>`;
      }).join("");
    }

    function mzCell(value, className = "", title = "") {

    function renderMzTable(headers, rows, headClass) {
      const head = headers.map(header => `<th class="${escapeHtml(header.className || "")}"${header.colspan ? ` colspan="${header.colspan}"` : ""}>${escapeHtml(header.label)}</th>`).join("");
      const body = rows.map(row => `<tr>${row.map(cell => `<td class="${escapeHtml(cell.className || "")}"${cell.colspan ? ` colspan="${cell.colspan}"` : ""}${cell.title ? ` title="${escapeHtml(cell.title)}"` : ""}>${escapeHtml(cell.value)}</td>`).join("")}</tr>`).join("");

    function operationToolName(sequence, operationFamily) {
      const block = sequence.blocks[0];
      const mappedName = mappedField(block, "Tool Name");
      if (mappedName) return String(mappedName).toUpperCase();
      if (block.tool?.name) return block.tool.name.toUpperCase();

    function renderGeometry(unit, mode) {

    }

    function classifyUnit(unit) {
      if (blockFor(unit, "G301")) return "endProgram";
      if (blockFor(unit, "G303")) return "subProgram";
      if (blockFor(unit, "G305")) return "manual";
      if (blockFor(unit, "G300")) return "initialSetup";
      if (blockFor(unit, "G380")) return "offset";
      if (blockFor(unit, "G371")) return "faceMill";
      if (blockFor(unit, "G350")) return "drilling";
      if (blockFor(unit, "G356")) return "circleMill";
      if (blockFor(unit, "G369")) return "chamferOut";
      if (blockFor(unit, "G357")) return "drillTap";
      return "generic";
    }

    function renderProgramMarkup(program) {
      const unitRenderers = {
        endProgram: renderEndProgramUnit,
        subProgram: renderSubProgramUnit,
        manual: renderManualUnit,
        initialSetup: renderInitialSetup,
        offset: renderOffsetUnit,
        faceMill: renderFaceMillUnit,
        drilling: renderDrillingUnit,
        circleMill: renderCircleMillUnit,
        chamferOut: renderChamferOutUnit,
        drillTap: renderDrillTapUnit,
        generic: renderGenericUnit
      };
      const tables = program.units.map(unit => {
        const type = classifyUnit(unit);
        const rendered = unitRenderers[type](unit);
        return type === "generic" ? rendered : rendered.replace("</section>", `${renderPreservedUnit(unit)}</section>`);
      }).join("");
      const order = program.executionOrder.filter(item => item.sequence && item.command.startsWith("N"));
      return `<div class="program-banner">
        <div><span class="label">FILE </span><span class="value">${escapeHtml(program.sourceFileName || "PAM PROGRAM")}</span></div>
        <div><span class="label">PROGRAM </span><span class="value">${escapeHtml(program.header.programNumber || "UNKNOWN")}</span></div>
        <div><span class="label">COMMENT </span><span class="value">${escapeHtml(program.header.comment || "—")}</span></div>
        <div><span class="label">DOCUMENT </span><span class="value">${program.metadata.rawLineCount} LINES · ${program.metadata.parsedBlockCount} BLOCKS · ${program.metadata.unitCount} UNITS</span></div>
      </div><div class="mz-order-note">EXECUTION PRIORITIES · ${order.length ? order.map(item => `${escapeHtml(item.unit)} ${escapeHtml(item.sequence)} = P${escapeHtml(item.priorityRaw)}`).join(" · ") : "NONE"}</div><div class="mz-screen">${tables || '<div class="empty">NO UNIT-NUMBERED BLOCKS FOUND</div>'}</div>`;
    }

    function renderDisplay(program) {
      viewer.innerHTML = renderProgramMarkup(program);
    }

    let currentPrograms = [];
    let activeProgramIndex = 0;
    let draggedProgramIndex = null;
    let dropAfterProgram = false;

    function selectProgram(index) {
      if (!currentPrograms[index]) return;
      activeProgramIndex = index;
      [...programFileTabs.querySelectorAll(".program-file-tab")].forEach((button, buttonIndex) => {
        const isActive = buttonIndex === activeProgramIndex;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-selected", String(isActive));
      });
      renderDisplay(currentPrograms[activeProgramIndex]);
    }

    function renderProgramTabs(selectedProgram = currentPrograms[activeProgramIndex]) {
      const selectedIndex = Math.max(0, currentPrograms.indexOf(selectedProgram));
      programFileTabs.innerHTML = currentPrograms.map((program, index) => {
        const label = `${program.sourceFileName || `PAM ${index + 1}`} · ${program.header.programNumber || "UNKNOWN"}`;
        return `<button class="program-file-tab${index === selectedIndex ? " active" : ""}" type="button" draggable="true" data-program-index="${index}" aria-selected="${index === selectedIndex}" title="${escapeHtml(label)} · Drag to reorder">${escapeHtml(label)}</button>`;
      }).join("");
      programFileTabs.hidden = currentPrograms.length === 0;
      selectProgram(selectedIndex);
    }

    function renderPrograms(programs) {
      currentPrograms = [...programs];
      renderProgramTabs(currentPrograms[0]);
    }

    function moveProgramTab(fromIndex, toIndex) {
      if (fromIndex === toIndex || !currentPrograms[fromIndex] || toIndex < 0 || toIndex >= currentPrograms.length) return toIndex;
      const selectedProgram = currentPrograms[activeProgramIndex];
      const [movedProgram] = currentPrograms.splice(fromIndex, 1);
      currentPrograms.splice(toIndex, 0, movedProgram);
      renderProgramTabs(selectedProgram);
      return currentPrograms.indexOf(movedProgram);
    }

    function clearProgramDropIndicators() {
      programFileTabs.querySelectorAll(".program-file-tab").forEach(button => button.classList.remove("drag-before", "drag-after", "dragging"));
    }

    programFileTabs.addEventListener("click", event => {
      const button = event.target.closest(".program-file-tab");
      if (!button) return;
      selectProgram(Number(button.dataset.programIndex));
    });

    programFileTabs.addEventListener("dragstart", event => {
      const button = event.target.closest(".program-file-tab");
      if (!button) return;
      draggedProgramIndex = Number(button.dataset.programIndex);
      button.classList.add("dragging");
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", String(draggedProgramIndex));
      }
    });

    programFileTabs.addEventListener("dragover", event => {
      const button = event.target.closest(".program-file-tab");
      if (!button || draggedProgramIndex === null) return;
      event.preventDefault();
      clearProgramDropIndicators();
      if (Number(button.dataset.programIndex) === draggedProgramIndex) button.classList.add("dragging");
      const bounds = button.getBoundingClientRect();
      dropAfterProgram = event.clientX > bounds.left + bounds.width / 2;
      button.classList.add(dropAfterProgram ? "drag-after" : "drag-before");
      if (event.dataTransfer) event.dataTransfer.dropEffect = "move";
    });

    programFileTabs.addEventListener("drop", event => {
      const button = event.target.closest(".program-file-tab");
      if (!button || draggedProgramIndex === null) return;
      event.preventDefault();
      const targetIndex = Number(button.dataset.programIndex);
      let insertionIndex = targetIndex + (dropAfterProgram ? 1 : 0);
      if (draggedProgramIndex < insertionIndex) insertionIndex -= 1;
      insertionIndex = Math.max(0, Math.min(currentPrograms.length - 1, insertionIndex));
      moveProgramTab(draggedProgramIndex, insertionIndex);
      draggedProgramIndex = null;
      clearProgramDropIndicators();
    });

    programFileTabs.addEventListener("dragend", () => {
      draggedProgramIndex = null;
      clearProgramDropIndicators();
    });

    programFileTabs.addEventListener("keydown", event => {
      if (!event.altKey || !["ArrowLeft", "ArrowRight"].includes(event.key)) return;
      const button = event.target.closest(".program-file-tab");
      if (!button) return;
      const fromIndex = Number(button.dataset.programIndex);
      const toIndex = fromIndex + (event.key === "ArrowLeft" ? -1 : 1);
      if (toIndex < 0 || toIndex >= currentPrograms.length) return;
      event.preventDefault();
      const movedIndex = moveProgramTab(fromIndex, toIndex);
      programFileTabs.querySelector(`[data-program-index="${movedIndex}"]`)?.focus();
    });

    window.renderDisplay = renderDisplay;
    window.selectProgram = selectProgram;
    window.moveProgramTab = moveProgramTab;

    let loadedDocuments = [];

    function runParser(documents = loadedDocuments) {
      error.textContent = "";
      const documentsToParse = documents.length ? documents : (source.value.trim() ? [{ name: "PAM PROGRAM", text: source.value }] : []);
      if (!documentsToParse.length) {
        error.textContent = "Load one or more PAM files first.";
        status.textContent = "NO DATA";
        return;
      }
      try {
        const programs = documentsToParse.map(document => {
          const program = parseMazatrol(document.text);
          program.sourceFileName = document.name;
          program.toolSummary = buildToolSummary(program);
          return program;
        });
        const combinedToolSummary = combineToolSummaries(programs.map(program => program.toolSummary));
        renderPrograms(programs);
        renderToolSummary(combinedToolSummary);
        viewTabs.hidden = false;
        activateView("program");
        const totals = programs.reduce((sum, program) => ({
          units: sum.units + program.metadata.unitCount,
          sequences: sum.sequences + program.metadata.sequenceCount
        }), { units: 0, sequences: 0 });
        jsonOutput.textContent = JSON.stringify({
          metadata: { programCount: programs.length, unitCount: totals.units, sequenceCount: totals.sequences },
          programs,
          toolSummary: combinedToolSummary
        }, null, 2);
        status.textContent = `${programs.length} PROGRAM${programs.length === 1 ? "" : "S"} · ${totals.units} UNITS · ${totals.sequences} SEQUENCES`;
      } catch (problem) {
        error.textContent = `Parser error: ${problem.message}`;
        status.textContent = "ERROR";
      }
    }

    function readPamFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ name: file.name, text: String(reader.result) });
        reader.onerror = () => reject(new Error(`${file.name} could not be read.`));
        reader.readAsText(file);
      });
    }

    async function loadFiles(fileList) {
      const files = [...fileList];
      if (!files.length) return;
      error.textContent = "";
      status.textContent = `LOADING ${files.length} PROGRAM${files.length === 1 ? "" : "S"}`;
      try {
        loadedDocuments = await Promise.all(files.map(readPamFile));
        source.value = loadedDocuments.map(document => `===== ${document.name} =====\n${document.text}`).join("\n\n");
        runParser(loadedDocuments);
        fileInput.value = "";
      } catch (problem) {
        error.textContent = problem.message;
        status.textContent = "FILE ERROR";
      }
    }

    fileInput.addEventListener("change", event => loadFiles(event.target.files));
    ["dragenter", "dragover"].forEach(name => dropZone.addEventListener(name, event => {
      event.preventDefault(); dropZone.classList.add("dragging");
    }));
    ["dragleave", "drop"].forEach(name => dropZone.addEventListener(name, event => {
      event.preventDefault(); dropZone.classList.remove("dragging");
    }));
    dropZone.addEventListener("drop", event => loadFiles(event.dataTransfer.files));

  </script>
</body>
</html>
